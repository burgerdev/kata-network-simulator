apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  labels:
    app: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      volumes:
        - name: script-vol
          configMap:
            name: netns-script
            defaultMode: 0755
      containers:
        - name: main
          image: nicolaka/netshoot@sha256:47b907d662d139d1e2f22bfe14f4efca1e3f1feed283572f47c970c780c03b61
          command:
            - sh
            - /data/setup.sh
          volumeMounts:
            - name: script-vol
              mountPath: /data
          securityContext:
            privileged: true
            # capabilities:
            #   add: ["SYS_ADMIN", "NET_ADMIN"]
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/ready"]
            initialDelaySeconds: 1
            periodSeconds: 1
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
